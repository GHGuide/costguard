<svg viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="var(--font-sans, system-ui, sans-serif)">
<title>CostGuard architecture on UiPath</title>
<desc>A developer change to an AI agent flows into the CostGuard coded agent, which runs the agent-under-test many times, computes cost per successful outcome versus a baseline, and returns a verdict: PASS promotes, FAIL blocks, NEEDS_REVIEW escalates to a human in Action Center. The whole gate runs on UiPath as an Orchestrator job, recorded in Test Cloud, with the AI Trust Layer providing cost evidence.</desc>
<defs>
<marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--color-border-tertiary, #9aa0a6)"/></marker>
</defs>
<rect x="200" y="20" width="280" height="50" rx="10" fill="var(--color-background-primary, #fff)" stroke="var(--color-border-secondary, #c9ced6)" stroke-width="1.5"/>
<text x="340" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="var(--color-text-primary, #1a1a1a)">Developer changes the agent</text>
<text x="340" y="58" text-anchor="middle" font-size="11" fill="var(--color-text-secondary, #5f6573)">new prompt / model / tool</text>
<line x1="340" y1="70" x2="340" y2="92" stroke="var(--color-border-tertiary, #9aa0a6)" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="180" y="94" width="320" height="50" rx="10" fill="var(--color-background-primary, #fff)" stroke="var(--color-border-secondary, #c9ced6)" stroke-width="1.5"/>
<text x="340" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="var(--color-text-primary, #1a1a1a)">Agent-under-test</text>
<text x="340" y="132" text-anchor="middle" font-size="11" fill="var(--color-text-secondary, #5f6573)">Document Understanding agent · or LangChain</text>
<line x1="340" y1="144" x2="340" y2="166" stroke="var(--color-border-tertiary, #9aa0a6)" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="110" y="168" width="460" height="58" rx="10" fill="var(--color-background-primary, #fff)" stroke="var(--color-text-info, #2f6fed)" stroke-width="2"/>
<text x="340" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="var(--color-text-primary, #1a1a1a)">CostGuard coded agent · UiPath Python SDK</text>
<text x="340" y="210" text-anchor="middle" font-size="11" fill="var(--color-text-secondary, #5f6573)">runs N times · cost per successful outcome + CI · vs baseline</text>
<line x1="340" y1="226" x2="340" y2="248" stroke="var(--color-border-tertiary, #9aa0a6)" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="250" y="250" width="180" height="44" rx="22" fill="var(--bg2, #f3f4f6)" stroke="var(--color-border-secondary, #c9ced6)" stroke-width="1.5"/>
<text x="340" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="var(--color-text-primary, #1a1a1a)">Verdict</text>
<text x="340" y="286" text-anchor="middle" font-size="10" fill="var(--color-text-secondary, #5f6573)">cost-per-outcome vs baseline</text>
<line x1="300" y1="294" x2="150" y2="330" stroke="var(--color-border-tertiary, #9aa0a6)" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="340" y1="294" x2="340" y2="330" stroke="var(--color-border-tertiary, #9aa0a6)" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="380" y1="294" x2="535" y2="330" stroke="var(--color-border-tertiary, #9aa0a6)" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="40" y="332" width="200" height="52" rx="10" fill="var(--color-background-primary, #fff)" stroke="#2e7d52" stroke-width="2"/>
<text x="140" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d52">PASS → promote</text>
<text x="140" y="372" text-anchor="middle" font-size="10" fill="var(--color-text-secondary, #5f6573)">ship the new version</text>
<rect x="250" y="332" width="180" height="52" rx="10" fill="var(--color-background-primary, #fff)" stroke="#c0392b" stroke-width="2"/>
<text x="340" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">FAIL → block</text>
<text x="340" y="372" text-anchor="middle" font-size="10" fill="var(--color-text-secondary, #5f6573)">stop the regression</text>
<rect x="440" y="332" width="200" height="52" rx="10" fill="var(--color-background-primary, #fff)" stroke="#c77700" stroke-width="2"/>
<text x="540" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#c77700">NEEDS_REVIEW</text>
<text x="540" y="370" text-anchor="middle" font-size="10" fill="var(--color-text-secondary, #5f6573)">→ Action Center (human)</text>
<rect x="40" y="430" width="600" height="64" rx="10" fill="var(--bg2, #f3f4f6)" stroke="var(--color-border-secondary, #c9ced6)" stroke-width="1.5"/>
<text x="340" y="453" text-anchor="middle" font-size="12" font-weight="700" fill="var(--color-text-primary, #1a1a1a)">Runs on UiPath Automation Cloud — the governance layer</text>
<text x="340" y="473" text-anchor="middle" font-size="11" fill="var(--color-text-secondary, #5f6573)">Orchestrator serverless job · Test Cloud result · AI Trust Layer cost evidence</text>
<text x="340" y="487" text-anchor="middle" font-size="10" fill="var(--color-text-secondary, #5f6573)">built + deployed + run by Claude Code via the uip CLI</text>
<text x="40" y="540" font-size="10" fill="var(--color-text-secondary, #5f6573)">Legend:</text>
<rect x="92" y="532" width="10" height="10" rx="2" fill="#2e7d52"/><text x="107" y="540" font-size="10" fill="var(--color-text-secondary, #5f6573)">promote</text>
<rect x="160" y="532" width="10" height="10" rx="2" fill="#c0392b"/><text x="175" y="540" font-size="10" fill="var(--color-text-secondary, #5f6573)">block</text>
<rect x="214" y="532" width="10" height="10" rx="2" fill="#c77700"/><text x="229" y="540" font-size="10" fill="var(--color-text-secondary, #5f6573)">human review</text>
</svg>
